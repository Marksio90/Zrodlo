# postgresql.prod.conf – konfiguracja produkcyjna dla PostgreSQL 16
# Dostrojona pod serwer z 4 GB RAM

# Połączenia
max_connections = 100
superuser_reserved_connections = 3

# Pamięć
shared_buffers = 1GB
effective_cache_size = 3GB
maintenance_work_mem = 256MB
work_mem = 10MB
wal_buffers = 16MB

# Checkpoints
checkpoint_completion_target = 0.9
wal_level = replica
max_wal_size = 2GB
min_wal_size = 512MB

# Planista
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logowanie (tylko wolne zapytania)
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_timezone = 'UTC'
datestyle = 'iso, mdy'
timezone = 'UTC'

# Autovacuum
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# Replikacja (gotowość)
wal_level = replica
max_wal_senders = 3
wal_keep_size = 512MB
