name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check app/ tests/

      - name: Format check
        run: ruff format --check app/ tests/

  # ── Testy backendu ──────────────────────────────────────────────────────────
  test-backend:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml

      - name: Install dependencies
        run: |
          pip install "bcrypt>=3.0.0,<4.0.0"
          pip install -e ".[test]"

      - name: Run tests
        run: pytest -v --tb=short

      - name: Upload coverage (opcjonalne)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/backend/.pytest_cache
          retention-days: 7

  # ── Docker build test ───────────────────────────────────────────────────────
  build-images:
    name: Docker build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [lint, test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: apps/backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker
        uses: docker/build-push-action@v5
        with:
          context: apps/worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: apps/frontend
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
