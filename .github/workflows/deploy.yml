name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Pomiń testy (tylko w awaryjnym przypadku)"
        required: false
        default: "false"

concurrency:
  group: deploy-production
  cancel-in-progress: false  # deploy nie może być anulowany

jobs:
  # ── Testy przed deployem ────────────────────────────────────────────────────
  test:
    name: Pre-deploy tests
    if: github.event.inputs.skip_tests != 'true'
    uses: ./.github/workflows/ci.yml

  # ── Build i push obrazów do registry ───────────────────────────────────────
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || github.event.inputs.skip_tests == 'true')

    permissions:
      contents: read
      packages: write

    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: apps/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: apps/worker
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/worker:latest
            ghcr.io/${{ github.repository }}/worker:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: apps/frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN }}/api
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy na serwer ────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd /opt/zrodlo

            # Pobierz aktualizacje infrastruktury
            git fetch origin main
            git checkout main
            git pull origin main

            # Zaloguj się do GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pobierz nowe obrazy
            docker pull ghcr.io/${{ github.repository }}/backend:${{ needs.build-and-push.outputs.sha_short }}
            docker pull ghcr.io/${{ github.repository }}/worker:${{ needs.build-and-push.outputs.sha_short }}
            docker pull ghcr.io/${{ github.repository }}/frontend:${{ needs.build-and-push.outputs.sha_short }}

            # Oznacz jako latest lokalnie
            docker tag ghcr.io/${{ github.repository }}/backend:${{ needs.build-and-push.outputs.sha_short }} zrodlo-backend:latest
            docker tag ghcr.io/${{ github.repository }}/worker:${{ needs.build-and-push.outputs.sha_short }} zrodlo-worker:latest
            docker tag ghcr.io/${{ github.repository }}/frontend:${{ needs.build-and-push.outputs.sha_short }} zrodlo-frontend:latest

            # Migracje bazy przed deployem
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              run --rm backend alembic upgrade head

            # Rolling restart (zero-downtime dla stateless services)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-build backend worker frontend nginx

            # Health check
            sleep 15
            curl -sf http://localhost/health || \
              (docker compose logs --tail=50 backend && exit 1)

            echo "✅ Deploy ${{ needs.build-and-push.outputs.sha_short }} zakończony"

      - name: Notify deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [[ "$STATUS" == "success" ]]; then
            ICON="✅"
          else
            ICON="🔴"
          fi
          echo "$ICON Deploy $STATUS – SHA: ${{ needs.build-and-push.outputs.sha_short }}"
